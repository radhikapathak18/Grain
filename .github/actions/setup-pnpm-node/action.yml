# Composite action: stand up Node 20 + pnpm 11.3.0 with the lockfile-keyed
# pnpm-store cache. Used by every Grain workflow so all jobs benefit from the
# same install profile and the same cache key.
name: 'Setup Node 20 + pnpm 11.3.0'
description: 'Installs pnpm, Node 20 with pnpm cache, runs `pnpm install --frozen-lockfile`.'
inputs:
  install:
    description: 'Run pnpm install --frozen-lockfile after toolchain setup.'
    required: false
    default: 'true'
runs:
  using: 'composite'
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 11.3.0
        run_install: false

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'

    - name: pnpm install
      if: inputs.install == 'true'
      shell: bash
      run: pnpm install --frozen-lockfile
